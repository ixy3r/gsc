<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>シフト抽出変換ツール</title>
    <link
      rel="stylesheet"
      href="https://pyscript.net/releases/2024.1.1/core.css"
    />
    <script
      type="module"
      src="https://pyscript.net/releases/2024.1.1/core.js"
    ></script>
    <style>
      body {
        font-family: sans-serif;
        max-width: 100vw;
        margin: 0;
        padding: 0;
        color: #ddd;
        background-color: #000;
      }
      .container {
        padding: 15px;
      }
      .input-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
      }
      input[type="text"],
      input[type="file"] {
        background: #333;
        color: #ddd;
        width: 100%;
        padding: 10px;
        border: 1px solid #444;
        border-radius: 6px;
        box-sizing: border-box;
      }
      button {
        background-color: #173e67;
        color: #ddd;
        border: none;
        padding: 14px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        width: 100%;
        font-weight: bold;
      }
      button:hover {
        background-color: #0056b3;
      }
      #console {
        margin-top: 20px;
        padding: 15px;
        border-radius: 8px;
        display: none;
        white-space: pre-wrap;
        font-family: "Consolas", monospace;
        font-size: 12px;
        background-color: #1e1e1e;
        color: #d4d4d4;
        max-height: 500px;
        overflow-y: auto;
      }
    </style>
    <py-config>
      packages = ["pdfminer.six", "ics==0.7", "tatsu==5.7.3", "pytz"]
    </py-config>
  </head>
  <body>
    <div class="container">
      <h2>シフト抽出変換ツール</h2>
      <div class="input-group">
        <label for="target_name">名前</label>
        <input type="text" id="target_name" placeholder="苗字を入力" />
      </div>
      <div class="input-group">
        <label for="pdf_upload">シフトPDFを選択</label>
        <input type="file" id="pdf_upload" accept="application/pdf" />
      </div>
      <button id="run_btn" py-click="main_process">実行</button>
      <div id="console"></div>
    </div>

    <script type="py">
      import io
      import re
      from datetime import datetime, timedelta
      import pytz
      from ics import Calendar, Event
      from pdfminer.high_level import extract_pages
      from pdfminer.layout import LTTextContainer
      from pyscript import document, window

      # 勤務区分定義
      SHIFT_MASTER = {
          "A": ("07:00", "16:00"), "B": ("08:00", "17:00"), "C": ("08:30", "17:30"),
          "D": ("09:00", "18:00"), "E": ("10:00", "19:00"), "J": ("14:15", "23:15"),
          "NL": ("08:30", "17:30"), "G": ("13:00", "17:00"), "FG": ("13:00", "17:00"),
          "5-14": ("05:00", "14:00"), "FA": ("08:30", "15:00"), "FB": ("08:30", "16:00"),
          "FC": ("08:30", "13:00"), "FD": ("11:00", "17:00"), "FE": ("12:00", "18:00"),
          "FF": ("12:00", "20:00"), "FH": ("13:00", "22:00"), "FI": ("13:15", "22:15"),
          "FJ": ("14:00", "23:00"), "FK": ("15:00", "23:00"), "FL": ("17:00", "23:00"),
          "FM": ("18:00", "23:00"), "FN": ("19:00", "23:00"), "FO": ("20:00", "23:00"),
          "FP": ("06:00", "15:00"), "FQ": ("08:00", "16:00"), "FR": ("08:00", "13:00"),
          "FS": ("09:00", "18:00"), "FT": ("09:00", "14:00"), "FU": ("10:00", "19:00"),
          "FV": ("11:00", "19:00")
      }

      def log(msg):
          el = document.querySelector("#console")
          el.style.display = "block"
          el.innerText += f"[{datetime.now().strftime('%H:%M:%S')}] {msg}\n"
          el.scrollTop = el.scrollHeight

      async def main_process(event):
          target_name = document.querySelector("#target_name").value.strip()
          files = document.querySelector("#pdf_upload").files
          document.querySelector("#console").innerText = ""

          if not target_name or len(files) == 0:
              window.alert("名前とファイルを入力してください")
              return

          try:
              log(f"--- プロセス開始: [{target_name}] ---")
              file = files.item(0)
              array_buffer = await file.arrayBuffer()
              pdf_data = io.BytesIO(array_buffer.to_bytes())

              # 1. 座標に基づいた行の再構築 (pdfplumberのロジックに相当)
              rows = {}
              full_text_for_date = ""

              for page_layout in extract_pages(pdf_data):
                  for element in page_layout:
                      if isinstance(element, LTTextContainer):
                          text = element.get_text().strip()
                          if not text: continue
                          full_text_for_date += text + "\n"

                          # Y座標をある程度丸めて同じ行として扱う (誤差吸収のため整数化)
                          y_key = int(element.y0)
                          if y_key not in rows: rows[y_key] = []
                          rows[y_key].append((element.x0, text))

              # 2. 基準日の特定
              year_match = re.search(r'(\d{4})\s*年', full_text_for_date)
              month_match = re.search(r'(\d{1,2})\s*月\s*(\d{1,2})\s*日', full_text_for_date)
              if not year_match or not month_match:
                  raise Exception("日付（◯年◯月◯日）を特定できませんでした。")

              start_dt = datetime(int(year_match.group(1)), int(month_match.group(1)), int(month_match.group(2)))
              log(f"期間開始日: {start_dt.strftime('%Y/%m/%d')}")

              # 3. 名前を含む「行」を特定し、記号を順番に取得
              target_codes = []
              # 画面上部から順にループ (Y座標が大きい順)
              for y in sorted(rows.keys(), reverse=True):
                  # 同じ行内でX座標順にソート
                  items = sorted(rows[y], key=lambda x: x[0])
                  row_content = [it[1] for it in items]
                  line_str = " ".join(row_content)

                  if target_name in line_str:
                      log(f"対象者の行を特定しました。")

                      # 勤務区分マスターにある記号を順番に抽出
                      sorted_keys = sorted(SHIFT_MASTER.keys(), key=len, reverse=True)
                      pattern = r'\b(' + '|'.join(re.escape(k) for k in sorted_keys) + r')\b'

                      # 名前の直後にある「数字のみ」や「曜日」を飛ばして記号を拾うため
                      # 行の内容全体から記号をリスト化
                      target_codes = re.findall(pattern, line_str)
                      break

              if not target_codes:
                  raise Exception(f"'{target_name}' さんの行からシフト記号が見つかりませんでした。")

              log(f"計 {len(target_codes)} 件の記号を抽出しました。")

              # 4. カレンダー生成 (31日間分)
              c = Calendar()
              tz = pytz.timezone("Asia/Tokyo")
              count = 0

              for i, code in enumerate(target_codes):
                  if i >= 31: break # 最大31日間

                  target_date = start_dt + timedelta(days=i)
                  if code in SHIFT_MASTER:
                      st, en = SHIFT_MASTER[code]
                      sh, sm = map(int, st.split(':'))
                      eh, em = map(int, en.split(':'))

                      ev = Event()
                      ev.name = f"{code}"
                      begin = tz.localize(target_date.replace(hour=sh, minute=sm))
                      end = tz.localize(target_date.replace(hour=eh, minute=em))
                      if end <= begin: end += timedelta(days=1)

                      ev.begin, ev.end = begin, end
                      c.events.add(ev)
                      log(f"  [登録] {target_date.strftime('%m/%d')}: {code}")
                      count += 1

              # 5. ファイル保存
              ics_str = str(c).replace('\n', '\r\n')
              blob = window.Blob.new([ics_str], {type: "text/calendar;charset=utf-8"})
              url = window.URL.createObjectURL(blob)
              link = document.createElement("a")
              link.href, link.download = url, f"golf_shift_{target_name}.ics"
              link.click()

              log(f"--- 完了: {count}件出力しました ---")

          except Exception as e:
              log(f"【エラー】 {str(e)}")
    </script>
  </body>
</html>
