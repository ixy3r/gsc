<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Shift to iCS Converter (Debug Mode)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 0 15px; line-height: 1.6; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; background: #f9f9f9; }
        input, button { display: block; width: 100%; margin: 10px 0; padding: 10px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #log { font-size: 0.8em; color: #333; white-space: pre-wrap; background: #eee; padding: 10px; margin-top: 10px; max-height: 400px; overflow-y: auto; border: 1px solid #ddd; }
        .debug-label { color: #d9534f; font-weight: bold; margin-top: 10px; display: block; }
    </style>
</head>
<body>
    <h2>シフトPDF → iCS変換</h2>
    <div class="card">
        <label>検索する名前</label>
        <input type="text" id="targetName" placeholder="苗字を入力" value="">
        
        <label>PDFファイルを選択</label>
        <input type="file" id="pdfFile" accept="application/pdf">
        
        <button id="convertBtn">iCSファイルを生成してダウンロード</button>
    </div>

    <span class="debug-label">実行ログ / デバッグ情報:</span>
    <div id="log">ここに処理の経過が表示されます...</div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const log = (msg, data = null) => {
            const logDiv = document.getElementById('log');
            if (data) {
                msg += "\n" + JSON.stringify(data, null, 2);
            }
            logDiv.textContent += msg + "\n-------------------\n";
            logDiv.scrollTop = logDiv.scrollHeight;
        };

        document.getElementById('convertBtn').addEventListener('click', async () => {
            const targetName = document.getElementById('targetName').value.trim();
            const fileInput = document.getElementById('pdfFile');
            const logDiv = document.getElementById('log');
            logDiv.textContent = ""; // ログをクリア

            if (!targetName || !fileInput.files[0]) {
                alert("名前とPDFファイルを入力してください");
                return;
            }

            log("1. 処理開始...");
            const file = fileInput.files[0];
            const arrayBuffer = await file.arrayBuffer();
            
            try {
                const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                const page = await pdf.getPage(1);
                const textContent = await page.getTextContent();
                
                // 座標から行を復元
                const items = textContent.items;
                const lines = {};
                items.forEach(item => {
                    const y = Math.round(item.transform[5]); 
                    if (!lines[y]) lines[y] = [];
                    lines[y].push({ x: item.transform[4], str: item.str });
                });

                const sortedY = Object.keys(lines).sort((a, b) => b - a);
                const tableData = sortedY.map(y => {
                    return lines[y].sort((a, b) => a.x - b.x).map(item => item.str);
                });

                log("2. 抽出されたテーブルデータ (上位5行):", tableData.slice(0, 5));

                const fullText = items.map(i => i.str).join(" ");
                log("3. 全文テキストの冒頭:", fullText.substring(0, 200) + "...");

                // 時間マッピング
                const timeMapping = {};
                const timePattern = /([A-Z]{1,2})\s*(\d{1,2})\s*[:：]\s*(\d{2})\s*[^0-9]+\s*(\d{1,2})\s*[:：]\s*(\d{2})/g;
                let m;
                while ((m = timePattern.exec(fullText)) !== null) {
                    timeMapping[m[1]] = { startH: parseInt(m[2]), startM: parseInt(m[3]), endH: parseInt(m[4]), endM: parseInt(m[5]) };
                }
                log("4. 抽出された時間マッピング:", timeMapping);

                // 日付とターゲット行
                let dates = [];
                let targetRow = null;
                const normalizedTarget = targetName.replace(/\s+/g, "");

                for (const row of tableData) {
                    const rowStr = row.join("");
                    const numericCells = row.filter(c => /^\d+$/.test(c.trim()));
                    
                    // 日付ヘッダーの判定（数値が並んでいる行）
                    if (numericCells.length > 10 && dates.length === 0) {
                        dates = numericCells;
                        log("5. 日付ヘッダーを特定:", dates);
                    }
                    if (rowStr.replace(/\s+/g, "").includes(normalizedTarget)) {
                        targetRow = row;
                        log("6. 対象者の行を特定しました:", targetRow);
                    }
                }

                if (!targetRow) throw new Error(`対象者「${targetName}」が表の中に見つかりませんでした。`);

                // iCS生成
                let icsContent = [
                    "BEGIN:VCALENDAR",
                    "VERSION:2.0",
                    "PRODID:-//Shift Converter//JP",
                    "X-WR-TIMEZONE:Asia/Tokyo"
                ];

                let eventCount = 0;
                let lastDay = 0;
                let currentMonth = 1; // デフォルト
                let currentYear = new Date().getFullYear();

                // 月の判定
                const monthMatch = fullText.match(/(\d{1,2})\s*月/);
                if (monthMatch) currentMonth = parseInt(monthMatch[1]);

                // 日付列とシフト記号の紐付け
                // ターゲット行の中で、記号（A, B, FKなど）が含まれるセルを探す
                log("7. スケジュール抽出を開始します...");

                targetRow.forEach(cell => {
                    const symbol = cell.trim();
                    if (timeMapping[symbol]) {
                        // ここで日付を特定するロジックが必要（簡易的に順番で紐付け）
                        // ※PDFの構造によってここが一番ズレやすいポイントです
                        log(`記号発見: ${symbol}`);
                    }
                });

                // --- 抽出ロジックの改善案 ---
                // 日付の数だけループし、対応する列の記号を拾う
                // PDFの列構造に依存するため、ログを見ながら調整が必要です
                
                // 仮のループ（targetRowの後半にシフトが入っていると想定）
                const potentialShifts = targetRow.filter(c => timeMapping[c.trim()]);
                log(`8. マッピングに一致する記号の総数: ${potentialShifts.length}`);

                // (実際の抽出処理はPDFの「列」のズレをログで見て調整します)
                // ... 既存の抽出ロジック ...

                if (potentialShifts.length === 0) {
                    log("警告: 記号は見つかりましたが、時間マッピングと一致しませんでした。");
                }

                icsContent.push("END:VCALENDAR");
                log("処理終了。");

            } catch (err) {
                log("エラー発生:", err.message);
                console.error(err);
            }
        });

        function download(content, filename) {
            const blob = new Blob([content], { type: 'text/calendar;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
