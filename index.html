<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ゴルフシフト PDF → iCS 変換（2026年4月専用改善版）</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 780px; margin: 30px auto; padding: 20px; line-height: 1.6; background: #f9f9f9; color: #333; }
        .card { border: 3px solid #0066cc; padding: 30px; border-radius: 14px; background: #fff; box-shadow: 0 8px 25px rgba(0,102,204,0.15); }
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #0066cc; }
        input, button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 1.05rem; }
        button { background: #0066cc; color: white; border: none; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #0055aa; }
        #log { background: #f8f9fa; padding: 18px; border-radius: 8px; max-height: 460px; overflow-y: auto; font-size: 0.9em; line-height: 1.5; border: 1px solid #ddd; font-family: monospace; }
        .success { color: #28a745; font-weight: bold; }
        .error { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🏌️ 2026年4月ゴルフシフトPDF → iCalendar変換</h2>
        <p style="color:#555;">添付PDFから指定した人のシフトを正確に抽出し、Googleカレンダーなどに取り込める<strong>.icsファイル</strong>を作成します。<br>（座標ベースの表解析で既存のずれ問題を完全解決）</p>
        
        <label>検索する名前（苗字のみ）</label>
        <input type="text" id="targetName" value="" placeholder="名前を入力">
        
        <label>PDFファイルを選択</label>
        <input type="file" id="pdfFile" accept="application/pdf">
        
        <button id="convertBtn">iCSファイルを生成してダウンロード</button>
    </div>

    <div id="log">ログがここに表示されます…</div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const logEl = document.getElementById('log');
        function log(msg, type = '') {
            const entry = document.createElement('div');
            entry.textContent = `[${new Date().toLocaleTimeString('ja-JP')}] ${msg}`;
            if (type === 'success') entry.className = 'success';
            if (type === 'error') entry.className = 'error';
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
        }

        document.getElementById('convertBtn').addEventListener('click', async () => {
            const targetName = document.getElementById('targetName').value.trim();
            const file = document.getElementById('pdfFile').files[0];

            if (!targetName || !file) {
                alert('名前とPDFファイルを選択してください');
                return;
            }

            logEl.innerHTML = '';
            log('🚀 PDF解析を開始します…', 'success');

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                const page = await pdf.getPage(1);
                const textContent = await page.getTextContent();

                // テキストアイテム取得（座標付き）
                const items = textContent.items
                    .map(item => ({
                        str: item.str.trim(),
                        x: Math.round(item.transform[4]),
                        y: Math.round(item.transform[5])
                    }))
                    .filter(i => i.str.length > 0);

                // 1. Y座標で論理行をクラスタリング（PDFの文字ずれ対策）
                const rows = groupIntoRows(items, 7);

                log(`📄 ${rows.length}行を検出`);

                // 2. 日付ヘッダー行を特定（31日分の数字）
                const { columnXs, daySequence, startYear, startMonth } = findDateHeader(rows);
                if (!columnXs) throw new Error('日付ヘッダーが見つかりませんでした');

                log(`📅 ${daySequence.length}日分の日付を検出（${startYear}年${startMonth}月〜）`);

                // 3. 対象者の行を特定
                const targetRow = findTargetRow(rows, targetName);
                if (!targetRow) throw new Error(`「${targetName}」さんの行が見つかりませんでした`);

                log(`👤 「${targetName}」さんのシフト行を特定`, 'success');

                // 4. 勤務区分 → 時間のマッピング抽出（正規表現＋このPDF特有のフォールバック）
                const timeMapping = extractTimeMapping(items);
                log(`🕒 ${Object.keys(timeMapping).length}件の時間定義を抽出`);

                // 5. シフト予定を抽出
                const events = extractEvents(targetRow, columnXs, daySequence, startYear, startMonth, timeMapping, targetName);

                if (events.length === 0) throw new Error('有効なシフト予定が1件も見つかりませんでした');

                log(`✅ ${events.length}件のシフトを抽出しました`, 'success');

                // 6. iCSファイル生成＆ダウンロード
                generateICS(events, targetName);

            } catch (err) {
                log(`❌ エラー: ${err.message}`, 'error');
                console.error(err);
            }
        });

        // ====================== ヘルパー関数 ======================

        function groupIntoRows(items, tolerance = 7) {
            const rowMap = new Map();
            items.forEach(item => {
                const key = Math.round(item.y / tolerance) * tolerance;
                if (!rowMap.has(key)) rowMap.set(key, []);
                rowMap.get(key).push(item);
            });
            return Array.from(rowMap.values())
                .map(row => row.sort((a, b) => a.x - b.x))
                .sort((a, b) => b[0].y - a[0].y); // 上から下へ
        }

        function findDateHeader(rows) {
            for (const row of rows) {
                const numbers = row.filter(item => /^\d{1,2}$/.test(item.str));
                if (numbers.length >= 25) {
                    const daySequence = numbers.map(n => parseInt(n.str));
                    const columnXs = numbers.map(n => n.x);

                    // 開始年月をPDF内から自動検出（なければ2026/3固定）
                    let year = 2026, month = 3;
                    const fullText = rows.flat().map(i => i.str).join(' ');
                    const dateMatch = fullText.match(/(\d{4})?\s*年?\s*(\d{1,2})\s*月\s*(\d{1,2})\s*日/);
                    if (dateMatch) {
                        if (dateMatch[1]) year = parseInt(dateMatch[1]);
                        month = parseInt(dateMatch[2]);
                    }
                    return { columnXs, daySequence, startYear: year, startMonth: month };
                }
            }
            return {};
        }

        function findTargetRow(rows, name) {
            const norm = name.replace(/[\s　（）()0-9]/g, '');
            for (const row of rows) {
                const rowText = row.map(i => i.str).join('');
                if (rowText.includes(name) || rowText.replace(/[\s　（）()0-9]/g, '').includes(norm)) {
                    return row;
                }
            }
            return null;
        }

        function extractTimeMapping(items) {
            const map = {};
            const fullText = items.map(i => i.str).join(' ');

            // 正規表現で時間定義を抽出
            const pattern = /([A-Z]{1,2}|NL|FW|J)\s*(\d{1,2})[:：]?(\d{2})?\s*[-〜~]\s*(\d{1,2})[:：]?(\d{2})/g;
            let match;
            while ((match = pattern.exec(fullText)) !== null) {
                const code = match[1];
                const sh = parseInt(match[2]);
                const sm = match[3] ? parseInt(match[3]) : 0;
                const eh = parseInt(match[4]);
                const em = match[5] ? parseInt(match[5]) : 0;
                map[code] = { startH: sh, startM: sm, endH: eh, endM: em };
            }

            // このPDF特有のコードを確実にフォールバック（凡例が読み取れなかった場合も安心）
            const fallback = {
                'FA': {startH:8, startM:30, endH:15, endM:0},
                'FB': {startH:8, startM:30, endH:16, endM:0},
                'FC': {startH:8, startM:30, endH:13, endM:0},
                'FD': {startH:11, startM:0, endH:17, endM:0},
                'FE': {startH:12, startM:0, endH:18, endM:0},
                'FF': {startH:12, startM:0, endH:20, endM:0},
                'FG': {startH:13, startM:0, endH:17, endM:0},
                'FH': {startH:13, startM:0, endH:18, endM:0},
                'FI': {startH:13, startM:0, endH:20, endM:0},
                'FJ': {startH:15, startM:0, endH:20, endM:0},
                'FK': {startH:15, startM:0, endH:23, endM:0},
                'FL': {startH:16, startM:0, endH:20, endM:0},
                'FM': {startH:16, startM:0, endH:23, endM:0},
                'FN': {startH:17, startM:0, endH:23, endM:0},
                'FO': {startH:18, startM:0, endH:23, endM:0},
                'FP': {startH:19, startM:0, endH:23, endM:0},
                'FQ': {startH:20, startM:0, endH:23, endM:0},
                'J': {startH:14, startM:15, endH:23, endM:15},
                'NL': {startH:8, startM:30, endH:17, endM:30},
                'FW': {startH:0, startM:0, endH:0, endM:0} // ジムのみ（時間なし）
            };

            return { ...fallback, ...map };
        }

        function extractEvents(targetRow, columnXs, daySequence, startYear, startMonth, timeMapping, personName) {
            const events = [];
            let currentYear = startYear;
            let currentMonth = startMonth;
            let lastDay = 0;

            for (let i = 0; i < daySequence.length; i++) {
                const day = daySequence[i];
                if (day < lastDay) {
                    currentMonth++;
                    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
                }
                lastDay = day;

                const colX = columnXs[i];

                // 該当列の全シフト記号を取得（1セルに複数ある場合も対応）
                const cellItems = targetRow.filter(item => Math.abs(item.x - colX) < 35);
                const cellText = cellItems.map(item => item.str).join(' ').trim();

                if (!cellText || cellText === '休' || cellText.includes('希')) continue;

                const codes = cellText.split(/\s+/).filter(c => c.length > 0 && !['休', '希'].includes(c));

                for (const code of codes) {
                    const t = timeMapping[code];
                    if (t) {
                        events.push({
                            summary: code,
                            year: currentYear,
                            month: currentMonth,
                            day: day,
                            startH: t.startH,
                            startM: t.startM,
                            endH: t.endH,
                            endM: t.endM
                        });
                    }
                }
            }
            return events;
        }

        function generateICS(events, personName) {
            let ics = [
                "BEGIN:VCALENDAR",
                "VERSION:2.0",
                "PRODID:-//GolfShiftConverter//JA//1.0",
                "X-WR-CALNAME:" + personName + "さんのゴルフシフト",
                "X-WR-TIMEZONE:Asia/Tokyo"
            ];

            const pad = n => n.toString().padStart(2, '0');

            events.forEach((ev, idx) => {
                let endDay = ev.day;
                let endMonth = ev.month;
                let endYear = ev.year;

                // 日跨ぎシフト対応（例: 夜勤）
                if (ev.endH < ev.startH || (ev.endH === ev.startH && ev.endM < ev.startM)) {
                    const temp = new Date(ev.year, ev.month - 1, ev.day + 1);
                    endDay = temp.getDate();
                    endMonth = temp.getMonth() + 1;
                    endYear = temp.getFullYear();
                }

                const startStr = `${ev.year}${pad(ev.month)}${pad(ev.day)}T${pad(ev.startH)}${pad(ev.startM)}00`;
                const endStr = `${endYear}${pad(endMonth)}${pad(endDay)}T${pad(ev.endH)}${pad(ev.endM)}00`;

                ics.push("BEGIN:VEVENT");
                ics.push(`SUMMARY:シフト [${ev.summary}]`);
                ics.push(`DTSTART;TZID=Asia/Tokyo:${startStr}`);
                ics.push(`DTEND;TZID=Asia/Tokyo:${endStr}`);
                ics.push(`UID:shift-${personName}-${idx}-${Date.now()}@example.com`);
                ics.push("END:VEVENT");
            });

            ics.push("END:VCALENDAR");

            const blob = new Blob([ics.join('\r\n')], { type: 'text/calendar' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${personName}_ゴルフシフト_${new Date().toISOString().slice(0,10)}.ics`;
            a.click();
            URL.revokeObjectURL(url);

            log('🎉 iCSファイルをダウンロードしました！（カレンダーにインポートしてください）', 'success');
        }
    </script>
</body>
</html>
