<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      ゴルフシフト PDF → iCS 変換（Python版ロジック完全移植・改善版）
    </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 780px;
        margin: 30px auto;
        padding: 20px;
        line-height: 1.6;
        background: #f9f9f9;
        color: #333;
      }
      .card {
        border: 3px solid #0066cc;
        padding: 30px;
        border-radius: 14px;
        background: #fff;
        box-shadow: 0 8px 25px rgba(0, 102, 204, 0.15);
      }
      label {
        display: block;
        margin: 15px 0 5px;
        font-weight: bold;
        color: #0066cc;
      }
      input,
      button {
        width: 100%;
        padding: 14px;
        margin: 8px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
        box-sizing: border-box;
        font-size: 1.05rem;
      }
      button {
        background: #0066cc;
        color: white;
        border: none;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: #0055aa;
      }
      #log {
        background: #f8f9fa;
        padding: 18px;
        border-radius: 8px;
        max-height: 460px;
        overflow-y: auto;
        font-size: 0.9em;
        line-height: 1.5;
        border: 1px solid #ddd;
        font-family: monospace;
      }
      .success {
        color: #28a745;
        font-weight: bold;
      }
      .error {
        color: #dc3545;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>
        🏌️ 2026年4月ゴルフシフトPDF → iCalendar変換（Python版ロジック完全反映）
      </h2>
      <p style="color: #555">
        Python版（pdfplumber）が正常に動くロジックをフロントエンドで完全に再現。<br />日付ヘッダー検出・名前検索・時間マッピングを大幅強化済み。
      </p>

      <label>検索する名前（苗字のみ）</label>
      <input
        type="text"
        id="targetName"
        value=""
        placeholder="名前を入力"
      />

      <label>PDFファイルを選択（2026年4月シフト_ゴルフ.pdf）</label>
      <input type="file" id="pdfFile" accept="application/pdf" />

      <button id="convertBtn">iCSファイルを生成してダウンロード</button>
    </div>

    <div id="log">ログがここに表示されます…</div>

    <script>
      const pdfjsLib = window["pdfjs-dist/build/pdf"];
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

      const logEl = document.getElementById("log");
      function log(msg, type = "") {
        const entry = document.createElement("div");
        entry.textContent = `[${new Date().toLocaleTimeString("ja-JP")}] ${msg}`;
        if (type === "success") entry.className = "success";
        if (type === "error") entry.className = "error";
        logEl.appendChild(entry);
        logEl.scrollTop = logEl.scrollHeight;
      }

      document
        .getElementById("convertBtn")
        .addEventListener("click", async () => {
          const targetName = document.getElementById("targetName").value.trim();
          const file = document.getElementById("pdfFile").files[0];

          if (!targetName || !file) {
            alert("名前とPDFファイルを選択してください");
            return;
          }

          logEl.innerHTML = "";
          log("🚀 PDF解析を開始します…", "success");

          try {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            const page = await pdf.getPage(1);
            const textContent = await page.getTextContent();

            const items = textContent.items
              .map((item) => ({
                str: item.str.trim(),
                x: Math.round(item.transform[4]),
                y: Math.round(item.transform[5]),
              }))
              .filter((i) => i.str.length > 0);

            const rows = groupIntoRows(items, 8);

            log(`📄 ${rows.length}行を検出`);

            const { columnXs, daySequence, startYear, startMonth } =
              findDateHeader(rows);
            if (!columnXs)
              throw new Error("日付ヘッダーが見つかりませんでした");

            log(
              `📅 ${daySequence.length}日分の日付を検出（${startYear}年${startMonth}月〜）`,
              "success",
            );

            const targetRow = findTargetRow(rows, targetName);
            if (!targetRow)
              throw new Error(
                `「${targetName}」さんの行が見つかりませんでした`,
              );

            log(`👤 「${targetName}」さんのシフト行を特定`, "success");

            const timeMapping = extractTimeMapping(items);
            log(`🕒 ${Object.keys(timeMapping).length}件の時間定義を抽出`);

            const events = extractEvents(
              targetRow,
              columnXs,
              daySequence,
              startYear,
              startMonth,
              timeMapping,
              targetName,
            );

            if (events.length === 0)
              throw new Error("有効なシフト予定が1件も見つかりませんでした");

            log(`✅ ${events.length}件のシフトを抽出しました`, "success");

            generateICS(events, targetName);
          } catch (err) {
            log(`❌ エラー: ${err.message}`, "error");
            console.error(err);
          }
        });

      // ====================== Python版ロジックを完全再現 ======================

      function groupIntoRows(items, tolerance = 8) {
        const rowMap = new Map();
        items.forEach((item) => {
          const key = Math.round(item.y / tolerance) * tolerance;
          if (!rowMap.has(key)) rowMap.set(key, []);
          rowMap.get(key).push(item);
        });
        return Array.from(rowMap.values())
          .map((row) => row.sort((a, b) => a.x - b.x))
          .sort((a, b) => b[0].y - a[0].y);
      }

      function findDateHeader(rows) {
        for (const row of rows) {
          const numericCells = row.filter((item) => /^\d{1,2}$/.test(item.str));
          if (numericCells.length >= 12) {
            // ← Python版と同じ「>10」基準に緩和
            const daySequence = numericCells.map((n) => parseInt(n.str));
            const columnXs = numericCells.map((n) => n.x);

            let year = 2026,
              month = 3;
            const fullText = rows
              .flat()
              .map((i) => i.str)
              .join(" ");
            const yearMatch = fullText.match(/(\d{4})\s*年/);
            if (yearMatch) year = parseInt(yearMatch[1]);
            const monthMatch = fullText.match(
              /(\d{1,2})\s*月\s*(\d{1,2})\s*日/,
            );
            if (monthMatch) month = parseInt(monthMatch[1]);

            log(
              `✅ 日付ヘッダー検出成功（${numericCells.length}個の数字）`,
              "success",
            );
            return {
              columnXs,
              daySequence,
              startYear: year,
              startMonth: month,
            };
          }
        }
        return {};
      }

      function findTargetRow(rows, name) {
        const normalize = (s) =>
          String(s)
            .replace(/[\s　（）()0-9]/g, "")
            .trim();
        const searchKeyword = normalize(name);

        for (const row of rows) {
          const rowTextCombined = row
            .map((item) => normalize(item.str))
            .join("");
          if (rowTextCombined.includes(searchKeyword)) {
            return row;
          }
        }
        return null;
      }

      function extractTimeMapping(items) {
        const map = {};
        const fullText = items.map((i) => i.str).join(" ");

        // Python版と完全に同じ正規表現
        const timePattern =
          /([A-Z]{1,2})\s*(\d{1,2})\s*[:：]\s*(\d{2})\s*[^0-9]+\s*(\d{1,2})\s*[:：]\s*(\d{2})/g;
        let match;
        while ((match = timePattern.exec(fullText)) !== null) {
          const symbol = match[1];
          const sh = parseInt(match[2]);
          const sm = parseInt(match[3]);
          const eh = parseInt(match[4]);
          const em = parseInt(match[5]);
          map[symbol] = { startH: sh, startM: sm, endH: eh, endM: em };
        }

        // PDF特有のフォールバック（Python版と同一）
        const fallback = {
          FA: { startH: 8, startM: 30, endH: 15, endM: 0 },
          FB: { startH: 8, startM: 30, endH: 16, endM: 0 },
          FC: { startH: 8, startM: 30, endH: 13, endM: 0 },
          FD: { startH: 11, startM: 0, endH: 17, endM: 0 },
          FE: { startH: 12, startM: 0, endH: 18, endM: 0 },
          FF: { startH: 12, startM: 0, endH: 20, endM: 0 },
          FG: { startH: 13, startM: 0, endH: 17, endM: 0 },
          FH: { startH: 13, startM: 0, endH: 18, endM: 0 },
          FI: { startH: 13, startM: 0, endH: 20, endM: 0 },
          FJ: { startH: 15, startM: 0, endH: 20, endM: 0 },
          FK: { startH: 15, startM: 0, endH: 23, endM: 0 },
          FL: { startH: 16, startM: 0, endH: 20, endM: 0 },
          FM: { startH: 16, startM: 0, endH: 23, endM: 0 },
          FN: { startH: 17, startM: 0, endH: 23, endM: 0 },
          FO: { startH: 18, startM: 0, endH: 23, endM: 0 },
          FP: { startH: 19, startM: 0, endH: 23, endM: 0 },
          FQ: { startH: 20, startM: 0, endH: 23, endM: 0 },
          J: { startH: 14, startM: 15, endH: 23, endM: 15 },
          NL: { startH: 8, startM: 30, endH: 17, endM: 30 },
          FW: { startH: 0, startM: 0, endH: 0, endM: 0 },
        };

        return { ...fallback, ...map };
      }

      function extractEvents(
        targetRow,
        columnXs,
        daySequence,
        startYear,
        startMonth,
        timeMapping,
        personName,
      ) {
        const events = [];
        let currentYear = startYear;
        let currentMonth = startMonth;
        let lastDay = 0;

        for (let i = 0; i < daySequence.length; i++) {
          const day = daySequence[i];
          if (day < lastDay) {
            currentMonth++;
            if (currentMonth > 12) {
              currentMonth = 1;
              currentYear++;
            }
          }
          lastDay = day;

          const colX = columnXs[i];
          const cellItems = targetRow.filter(
            (item) => Math.abs(item.x - colX) < 40,
          );
          let cellText = cellItems
            .map((item) => item.str)
            .join(" ")
            .trim();

          if (!cellText || cellText === "休" || cellText.includes("希"))
            continue;

          const parts = cellText.split(/\s+/);
          let validSymbol = null;
          for (const p of parts) {
            if (timeMapping[p]) {
              validSymbol = p;
              break;
            }
          }

          if (validSymbol) {
            const t = timeMapping[validSymbol];
            let endDay = day,
              endMonth = currentMonth,
              endYear = currentYear;
            if (
              t.endH < t.startH ||
              (t.endH === t.startH && t.endM < t.startM)
            ) {
              const temp = new Date(currentYear, currentMonth - 1, day + 1);
              endDay = temp.getDate();
              endMonth = temp.getMonth() + 1;
              endYear = temp.getFullYear();
            }

            events.push({
              summary: validSymbol,
              year: currentYear,
              month: currentMonth,
              day: day,
              startH: t.startH,
              startM: t.startM,
              endH: t.endH,
              endM: t.endM,
            });
          }
        }
        return events;
      }

      function generateICS(events, personName) {
        let ics = [
          "BEGIN:VCALENDAR",
          "VERSION:2.0",
          "PRODID:-//GolfShiftConverter//JA//1.0",
          "X-WR-CALNAME:" + personName + "さんのゴルフシフト",
          "X-WR-TIMEZONE:Asia/Tokyo",
        ];

        const pad = (n) => n.toString().padStart(2, "0");

        events.forEach((ev, idx) => {
          let endDay = ev.day,
            endMonth = ev.month,
            endYear = ev.year;
          if (
            ev.endH < ev.startH ||
            (ev.endH === ev.startH && ev.endM < ev.startM)
          ) {
            const temp = new Date(ev.year, ev.month - 1, ev.day + 1);
            endDay = temp.getDate();
            endMonth = temp.getMonth() + 1;
            endYear = temp.getFullYear();
          }

          const startStr = `${ev.year}${pad(ev.month)}${pad(ev.day)}T${pad(ev.startH)}${pad(ev.startM)}00`;
          const endStr = `${endYear}${pad(endMonth)}${pad(endDay)}T${pad(ev.endH)}${pad(ev.endM)}00`;

          ics.push("BEGIN:VEVENT");
          ics.push(`SUMMARY:シフト [${ev.summary}]`);
          ics.push(`DTSTART;TZID=Asia/Tokyo:${startStr}`);
          ics.push(`DTEND;TZID=Asia/Tokyo:${endStr}`);
          ics.push(`UID:shift-${personName}-${idx}-${Date.now()}@example.com`);
          ics.push("END:VEVENT");
        });

        ics.push("END:VCALENDAR");

        const blob = new Blob([ics.join("\r\n")], { type: "text/calendar" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${personName}_ゴルフシフト_${new Date().toISOString().slice(0, 10)}.ics`;
        a.click();
        URL.revokeObjectURL(url);

        log(
          "🎉 iCSファイルをダウンロードしました！（Googleカレンダーなどにインポートしてください）",
          "success",
        );
      }
    </script>
  </body>
</html>
