<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Shift to iCS Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 20px auto; padding: 0 15px; line-height: 1.6; color: #333; }
        .card { border: 2px solid #007bff; padding: 25px; border-radius: 12px; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, button { display: block; width: 100%; margin: 15px 0; padding: 12px; box-sizing: border-box; border-radius: 6px; border: 1px solid #ccc; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; font-size: 1.1rem; transition: background 0.2s; }
        button:hover { background: #0056b3; }
        #log { font-size: 0.85em; color: #444; white-space: pre-wrap; background: #f8f9fa; padding: 15px; margin-top: 20px; border-radius: 6px; border: 1px solid #ddd; max-height: 400px; overflow-y: auto; }
        .log-entry { border-bottom: 1px solid #eee; padding: 4px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="margin-top:0">📅 シフトPDF → iCS 変換</h2>
        <p style="font-size:0.9em; color:#666">PDFから予定を抽出し、カレンダー用ファイルを作成します。</p>
        
        <label><strong>検索する名前</strong></label>
        <input type="text" id="targetName" placeholder="例：瀧上" value="瀧上">
        
        <label><strong>PDFファイルを選択</strong></label>
        <input type="file" id="pdfFile" accept="application/pdf">
        
        <button id="convertBtn">iCSを生成してダウンロード</button>
    </div>

    <div id="log">ログがここに表示されます...</div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const log = (msg) => {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = msg;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        };

        document.getElementById('convertBtn').addEventListener('click', async () => {
            const targetName = document.getElementById('targetName').value.trim();
            const fileInput = document.getElementById('pdfFile');
            document.getElementById('log').textContent = "";

            if (!targetName || !fileInput.files[0]) {
                alert("名前とPDFファイルを入力してください");
                return;
            }

            log("🚀 処理を開始します...");
            const arrayBuffer = await fileInput.files[0].arrayBuffer();
            
            try {
                const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                const page = await pdf.getPage(1);
                const textContent = await page.getTextContent();
                
                // 1. 座標に基づいたテキストの再構成
                const items = textContent.items;
                const lines = {};
                items.forEach(item => {
                    const y = Math.round(item.transform[5]); 
                    if (!lines[y]) lines[y] = [];
                    lines[y].push({ x: item.transform[4], str: item.str });
                });

                const sortedY = Object.keys(lines).sort((a, b) => b - a);
                const tableData = sortedY.map(y => {
                    return lines[y].sort((a, b) => a.x - b.x).map(item => item.str.trim());
                });

                const fullText = items.map(i => i.str).join(" ");

                // 2. 時間マッピング抽出 (柔軟な正規表現)
                const timeMapping = {};
                const timePattern = /([A-Z]{1,2})\s*(\d{1,2})[:：]?(\d{2})?\s*[-~〜]\s*(\d{1,2})[:：]?(\d{2})/g;
                let m;
                while ((m = timePattern.exec(fullText)) !== null) {
                    const startH = parseInt(m[2]);
                    const startM = m[3] ? parseInt(m[3]) : 0;
                    const endH = parseInt(m[4]);
                    const endM = parseInt(m[5]);
                    timeMapping[m[1]] = { startH, startM, endH, endM };
                }
                log(`✅ 時間定義を${Object.keys(timeMapping).length}件取得しました`);

                // 3. 開始年月と日付の特定
                let startYear = 2026;
                let startMonth = 3;
                const dateMatch = fullText.match(/(\d{4})?\s*年?\s*(\d{1,2})\s*月\s*(\d{1,2})\s*日/);
                if (dateMatch) {
                    if (dateMatch[1]) startYear = parseInt(dateMatch[1]);
                    startMonth = parseInt(dateMatch[2]);
                }

                let dates = [];
                let dateRowIdx = -1;
                tableData.forEach((row, idx) => {
                    const numericCells = row.filter(c => /^\d+$/.test(c));
                    if (numericCells.length > 20 && dateRowIdx === -1) {
                        dates = row;
                        dateRowIdx = idx;
                    }
                });

                if (dateRowIdx === -1) throw new Error("日付行が見つかりませんでした");
                log(`📅 ${startYear}年${startMonth}月開始のシフトとして処理します`);

                // 4. ターゲット行の特定とイベント抽出
                let events = [];
                const normalizedTarget = targetName.replace(/\s+/g, "");

                tableData.forEach(row => {
                    const rowContent = row.join("");
                    if (rowContent.replace(/\s+/g, "").includes(normalizedTarget)) {
                        log(`👤 「${targetName}」さんのデータ行を特定しました`);
                        
                        let currentYear = startYear;
                        let currentMonth = startMonth;
                        let lastDay = 0;

                        dates.forEach((dayStr, colIdx) => {
                            if (!/^\d+$/.test(dayStr)) return;
                            
                            const day = parseInt(dayStr);
                            if (day < lastDay) {
                                currentMonth++;
                                if (currentMonth > 12) { currentMonth = 1; currentYear++; }
                            }
                            lastDay = day;

                            const cellValue = row[colIdx];
                            if (cellValue) {
                                // 1セル内に複数記号がある場合を考慮 (例: "FK FN")
                                const symbols = cellValue.split(/\s+/);
                                symbols.forEach(s => {
                                    if (timeMapping[s]) {
                                        events.push({
                                            summary: s,
                                            year: currentYear,
                                            month: currentMonth,
                                            day: day,
                                            time: timeMapping[s]
                                        });
                                        log(`✨ 抽出: ${currentMonth}/${day} [${s}]`);
                                    }
                                });
                            }
                        });
                    }
                });

                if (events.length === 0) throw new Error("予定が1件も見つかりませんでした。名前が正しいか確認してください。");

                // 5. iCS生成
                generateIcs(events);
                log(`🎉 完了！${events.length}件の予定をダウンロードしました。`);

            } catch (err) {
                log(`❌ エラー: ${err.message}`);
                console.error(err);
            }
        });

        function generateIcs(events) {
            let ics = ["BEGIN:VCALENDAR", "VERSION:2.0", "X-WR-TIMEZONE:Asia/Tokyo"];
            const pad = (n) => n.toString().padStart(2, '0');

            events.forEach(ev => {
                const t = ev.time;
                const start = `${ev.year}${pad(ev.month)}${pad(ev.day)}T${pad(t.startH)}${pad(t.startM)}00`;
                
                let endDay = ev.day;
                let endMonth = ev.month;
                let endYear = ev.year;
                if (t.endH < t.startH) { // 日跨ぎ
                    const d = new Date(ev.year, ev.month - 1, ev.day + 1);
                    endDay = d.getDate();
                    endMonth = d.getMonth() + 1;
                    endYear = d.getFullYear();
                }
                const end = `${endYear}${pad(endMonth)}${pad(endDay)}T${pad(t.endH)}${pad(t.endM)}00`;

                ics.push("BEGIN:VEVENT");
                ics.push(`SUMMARY:シフト[${ev.summary}]`);
                ics.push(`DTSTART:${start}`);
                ics.push(`DTEND:${end}`);
                ics.push("END:VEVENT");
            });

            ics.push("END:VCALENDAR");
            const blob = new Blob([ics.join("\r\n")], { type: 'text/calendar' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `shift_${new Date().getTime()}.ics`;
            a.click();
        }
    </script>
</body>
</html>
