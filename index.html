<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>シフト抽出変換ツール</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/add-to-calendar-button@2/assets/css/atcb.min.css"
    />
    <link
      rel="stylesheet"
      href="https://pyscript.net/releases/2024.1.1/core.css"
    />
    <script
      type="module"
      src="https://pyscript.net/releases/2024.1.1/core.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/add-to-calendar-button@2"></script>
    <style>
      body {
        font-family: sans-serif;
        max-width: 100%;
        margin: 0;
        padding: 0;
        color: #ddd;
        background-color: #000;
      }
      .container {
        padding: 15px;
        width: 60%;
        max-width: 800px;
      }
      .discription {
        margin-bottom: 20px;
        line-height: 1.6;
        font-size: 0.8em;
      }
      p {
        margin: 0;
      }
      .input-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
      }
      input[type="text"],
      input[type="file"] {
        background: #333;
        color: #ddd;
        width: 100%;
        padding: 10px;
        border: 1px solid #444;
        border-radius: 6px;
        box-sizing: border-box;
      }
      button {
        background-color: #173e67;
        color: #ddd;
        border: none;
        padding: 14px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        width: 100%;
        font-weight: bold;
      }
      #console {
        width: calc(100% - 30px);
        max-width: 800px;
        margin-top: 20px;
        padding: 15px;
        border-radius: 8px;
        display: none;
        white-space: pre-wrap;
        font-family: "Consolas", monospace;
        font-size: 12px;
        background-color: #1e1e1e;
        color: #d4d4d4;
        max-height: 500px;
        overflow-y: auto;
      }
      #calendar_button_container {
        display: flex;
        justify-content: center;
        margin-top: 20px;
      }
    </style>
    <py-config> packages = ["pdfminer.six", "tatsu==5.7.3", "pytz"] </py-config>
  </head>
  <body>
    <div class="container">
      <h2>シフト抽出変換ツール</h2>
      <div class="discription">
        <p>抽出対象者の名前を入力し、PDFファイルを選択してください。</p>
        <p>読み込みには時間がかかる場合があります。</p>
      </div>
      <div class="input-group">
        <label for="target_name">名前</label>
        <input
          type="text"
          id="target_name"
          placeholder="抽出対象者の苗字を入力"
        />
      </div>
      <div class="input-group">
        <label for="pdf_upload">シフトPDFを選択</label>
        <input type="file" id="pdf_upload" accept="application/pdf" />
      </div>
      <button id="run_btn" py-click="main_process">実行</button>

      <div id="calendar_button_container"></div>

      <div id="console"></div>
    </div>

    <script type="text/javascript">
  window.updateCalendarButton = function (eventsJson, targetName) {
    const events = JSON.parse(eventsJson);
    const container = document.getElementById("calendar_button_container");

    container.innerHTML = "";
    container.style.display = "block";

    if (events.length === 0) {
      container.innerHTML = "<p style='color:#888; text-align:center; padding:20px;'>シフトが見つかりませんでした。</p>";
      return;
    }

    console.log("add-to-calendar-button 生成開始 - イベント数:", events.length);

    // 複数イベントの場合 → 1つのボタンに「リスト」としてまとめる（公式推奨）
    // 各イベントを個別のボタンにするより、1ボタンでモーダルリスト表示の方がシンプルで安定
    const mainEvent = events[0]; // 最初のイベントをベースにタイトルなど設定

    const btn = document.createElement("add-to-calendar-button");

    // 必須属性を設定
    btn.setAttribute("name", `シフト_${targetName}`);
    btn.setAttribute("description", "PDFから抽出されたシフト予定です。");
    btn.setAttribute("options", "['Apple','Google','iCal']");
    btn.setAttribute("theme", "dark");
    btn.setAttribute("listStyle", "modal");
    btn.setAttribute("language", "ja");
    btn.setAttribute("timeZone", "Asia/Tokyo");
    btn.setAttribute("label", "カレンダーに一括登録");

    // 複数イベントは "dates" 属性としてJSON文字列で渡す（v2で対応）
    btn.setAttribute("dates", JSON.stringify(events.map(e => ({
      name: e.name,
      startDate: e.startDate,
      startTime: e.startTime,
      endDate: e.endDate,
      endTime: e.endTime,
      timeZone: "Asia/Tokyo"
    }))));

    container.appendChild(btn);

    console.log("Web Component追加完了");
  };
</script>

    <script type="py">
      import io
      import re
      import json
      from datetime import datetime, timedelta
      import pytz
      from pdfminer.high_level import extract_pages
      from pdfminer.layout import LTTextContainer
      from pyscript import document, window

      SHIFT_MASTER = {
          "FA": ("08:30", "15:00"), "FB": ("08:30", "16:00"), "FC": ("08:30", "13:00"),
          "FD": ("11:00", "17:00"), "FE": ("12:00", "18:00"), "FF": ("12:00", "20:00"),
          "FG": ("13:00", "17:00"), "FH": ("13:00", "18:00"), "FI": ("13:00", "20:00"),
          "FJ": ("15:00", "20:00"), "FK": ("15:00", "23:00"), "FL": ("16:00", "20:00"),
          "FM": ("16:00", "23:00"), "FN": ("17:00", "23:00"), "FO": ("18:00", "23:00"),
          "FP": ("19:00", "23:00"), "FQ": ("20:00", "23:00"), "FR": ("09:00", "13:00"),
          "FS": ("13:00", "16:00"), "FT": ("15:00", "16:00"), "FU": ("15:00", "17:00"),
          "FV": ("15:00", "19:00"), "NN": ("09:00", "18:00"), "NL": ("08:30", "17:30")
      }

      def log(msg):
          el = document.querySelector("#console")
          el.style.display = "block"
          el.innerText += f"{msg}\n"
          el.scrollTop = el.scrollHeight

      async def main_process(event):
          target_name = document.querySelector("#target_name").value.strip()
          files = document.querySelector("#pdf_upload").files
          document.querySelector("#console").innerText = ""
          document.querySelector("#calendar_button_container").style.display = "none"

          if not target_name or len(files) == 0:
              window.alert("名前とファイルを入力してください")
              return

          try:
              log(f"--- プロセス開始 ---")
              log(f"対象者: {target_name}")

              log(f"")
              log(f"処理中...")
              log(f"")

              file = files.item(0)
              array_buffer = await file.arrayBuffer()
              pdf_data = io.BytesIO(array_buffer.to_bytes())

              rows = {}
              full_text_for_date = ""

              for page_layout in extract_pages(pdf_data):
                  for element in page_layout:
                      if isinstance(element, LTTextContainer):
                          text = element.get_text().strip()
                          if not text: continue
                          full_text_for_date += text + "\n"
                          y_key = int(element.y0)
                          if y_key not in rows: rows[y_key] = []
                          rows[y_key].append((element.x0, text))

              year_match = re.search(r'(\d{4})\s*年', full_text_for_date)
              month_match = re.search(r'(\d{1,2})\s*月\s*(\d{1,2})\s*日', full_text_for_date)
              if not year_match or not month_match:
                  raise Exception("日付（◯年◯月◯日）を特定できませんでした。")

              start_dt = datetime(int(year_match.group(1)), int(month_match.group(1)), int(month_match.group(2)))
              log(f"開始日: {start_dt.strftime('%Y/%m/%d')}")


              date_x_map = {}
              for y in sorted(rows.keys(), reverse=True):
                  items = sorted(rows[y], key=lambda x: x[0])
                  day_nums = [it for it in items if it[1].isdigit() and 1 <= int(it[1]) <= 31]
                  if len(day_nums) >= 10:
                      for x_pos, day_val in day_nums:
                          date_x_map[int(day_val)] = x_pos
                      log("日付行のレイアウトを特定しました。")
                      break

              if not date_x_map:
                  raise Exception("日付の配置を特定できませんでした。")



              # 4. 対象者の行を特定し、日付座標に基づいてシフトを抽出
              atcb_events = []
              count = 0
              sorted_keys = sorted(SHIFT_MASTER.keys(), key=len, reverse=True)
              shift_pattern = r'^(' + '|'.join(re.escape(k) for k in sorted_keys) + r')$'

              for y in sorted(rows.keys(), reverse=True):
                  items = sorted(rows[y], key=lambda x: x[0])
                  line_str = " ".join([it[1] for it in items])

                  if target_name in line_str:
                      log("対象者の行を特定。照合を開始します...")

                      for i in range(32):
                          curr_date = start_dt + timedelta(days=i)
                          day_num = curr_date.day

                          if day_num in date_x_map:
                              target_x = date_x_map[day_num]
                              found_code = None

                              # 日付のX座標に近い(±25px)位置にあるテキストをチェック
                              for x_pos, text in items:
                                  if abs(x_pos - target_x) < 5:
                                      if re.match(shift_pattern, text):
                                          found_code = text
                                          break

                              if found_code:
                                  st, en = SHIFT_MASTER[found_code]
                                  sh, sm = map(int, st.split(':'))
                                  eh, em = map(int, en.split(':'))

                                  begin_dt = curr_date.replace(hour=sh, minute=sm)
                                  end_dt = curr_date.replace(hour=eh, minute=em)
                                  if end_dt <= begin_dt: end_dt += timedelta(days=1)

                                  atcb_events.append({
                                      "name": f"{found_code}",
                                      "startDate": begin_dt.strftime("%Y-%m-%d"),
                                      "startTime": begin_dt.strftime("%H:%M"),
                                      "endDate": end_dt.strftime("%Y-%m-%d"),
                                      "endTime": end_dt.strftime("%H:%M"),
                                      "timeZone": "Asia/Tokyo"
                                  })
                                  log(f"{curr_date.strftime('%m/%d')} {found_code} ({st}-{en})")
                                  count += 1
                      break

              if count == 0:
                  raise Exception("シフト記号が1件も見つかりませんでした。")

              # 5. UI更新
              window.updateCalendarButton(json.dumps(atcb_events), target_name)
              log(f"--- 完了 ---")
              log("[カレンダーに一括登録]ボタンからカレンダーに登録できます。")

          except Exception as e:
              log(f"【エラー】 {str(e)}")
    </script>
  </body>
</html>
